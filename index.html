<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI + TDEE Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="card">
    <header class="card__header">
      <p class="eyebrow">คำนวณสุขภาพ</p>
      <h1>BMI + TDEE Calculator</h1>
      <p class="subtitle">กรอกข้อมูลของคุณ เพื่อดูค่าดัชนีมวลกาย และแคลอรี่ที่ควรได้รับต่อวัน</p>
    </header>

    <form id="bmi-form" class="form" novalidate>

      <div class="field">
        <label for="height">ส่วนสูง (เซนติเมตร)</label>
        <input type="number" id="height" name="height" placeholder="เช่น 170" min="50" max="250" step="0.1">
      </div>

      <div class="field">
        <label for="weight">น้ำหนัก (กิโลกรัม)</label>
        <input type="number" id="weight" name="weight" placeholder="เช่น 60" min="10" max="300" step="0.1">
      </div>

      <div class="field">
        <label for="age">อายุ (ปี)</label>
        <input type="number" id="age" name="age" placeholder="เช่น 20" min="1" max="120" step="1">
      </div>

      <div class="field">
        <label for="gender">เพศ</label>
        <select id="gender" name="gender">
          <option value="male">ชาย</option>
          <option value="female">หญิง</option>
        </select>
      </div>

      <div class="field field--wide">
        <label for="activity">ระดับกิจกรรมในแต่ละวัน</label>
        <select id="activity" name="activity">
          <option value="1.2">แทบไม่ออกกำลังกาย (นั่งทำงานทั้งวัน)</option>
          <option value="1.375">ออกกำลังกายเบาๆ 1–3 วัน/สัปดาห์</option>
          <option value="1.55">ออกกำลังกายปานกลาง 3–5 วัน/สัปดาห์</option>
          <option value="1.725">ออกกำลังกายหนัก 6–7 วัน/สัปดาห์</option>
          <option value="1.9">ออกกำลังกายหนักมาก / ใช้แรงงานทุกวัน</option>
        </select>
      </div>

      <button type="submit" id="calculate-btn" class="btn">คำนวณผลลัพธ์</button>
    </form>

    <p id="error-message" class="error-message" hidden></p>

    <section id="result" class="result" hidden>
      <div class="result__block">
        <p class="result__label">ค่าดัชนีมวลกาย (BMI)</p>
        <p id="bmi-value" class="result__value"></p>
        <p id="bmi-category" class="result__badge"></p>
      </div>

      <div class="result__block">
        <p class="result__label">แคลอรี่ที่ควรได้รับต่อวัน (TDEE)</p>
        <p id="tdee-value" class="result__value"></p>
        <p class="result__hint">เพื่อรักษาน้ำหนักปัจจุบันตามระดับกิจกรรมที่เลือก</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
